apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: prometheus
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - name: 'FastAPI ML Dashboards'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards/fastapi-ml










